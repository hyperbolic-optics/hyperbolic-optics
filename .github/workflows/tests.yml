name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run tests
      run: |
        # Goldens are an environment-pinned local refactor lock; the slow
        # FullSweep cases are deselected to keep the matrix fast.
        uv run pytest -m "not slow and not golden" --cov=hyperbolic_optics --cov-report=xml --cov-report=term

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Lint with ruff
      run: |
        uv run ruff check hyperbolic_optics tests
      continue-on-error: true

    - name: Check formatting with ruff
      run: |
        uv run ruff format --check hyperbolic_optics tests
      continue-on-error: true